<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="J Kanji">
  <meta name="theme-color" content="#1a1008">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>J Kanji</title>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #f5efe3; }</style>
</head>
<body>
  <div id="root"></div>
  <div id="error" style="display:none;padding:20px;color:red;font-family:monospace;white-space:pre-wrap"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script>
if ('serviceWorker' in navigator && location.hostname !== 'www.claudeusercontent.com') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW failed:', err));
  });
}
window.onerror = function(msg,src,line,col,err) {
  var el = document.getElementById('error');
  el.style.display = 'block';
  el.textContent = 'Error: ' + msg + '\nLine: ' + line + '\n' + (err ? err.stack : '');
};
  </script>
  <script src="./data-grammar.js"></script>
  <script src="./data-thematic.js"></script>
  <script src="./data-spicy.js"></script>
  <script src="./data-grades.js"></script>
  <script src="./data-grades-2-5.js"></script>
  <script src="./data-groups.js"></script>
  <script src="./app-compiled.js"></script>
  <script>
try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
} catch(e) {
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = e.stack;
}
  </script>
</body>
</html>
